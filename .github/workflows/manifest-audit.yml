name: Android Manifest Audit

on:
  push:
    branches: [ main, develop ]
    paths: [ '**/AndroidManifest.xml' ]
  pull_request:
    branches: [ main ]
    paths: [ '**/AndroidManifest.xml' ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        
    - name: Discover and audit manifests
      id: audit
      run: |
        # Discover manifests and run audit
        MANIFESTS=$(find . -name "AndroidManifest.xml" -not -path "./build/*" -not -path "./.git/*" | tr '\n' ' ')
        
        if [ -z "$MANIFESTS" ]; then
          echo "No AndroidManifest.xml files found"
          echo "found=false" >> $GITHUB_OUTPUT
        else
          echo "Found manifests: $MANIFESTS"
          echo "found=true" >> $GITHUB_OUTPUT
          
          # Generate SARIF report
          manifest-audit $MANIFESTS --sarif > audit-results.sarif
          
          # Also generate human-readable report for PR comments
          manifest-audit $MANIFESTS > audit-results.txt
          
          # Display results
          echo "## Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload SARIF file
      if: steps.audit.outputs.found == 'true'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: audit-results.sarif
        
    - name: Comment PR with results
      if: github.event_name == 'pull_request' && steps.audit.outputs.found == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('audit-results.txt', 'utf8');
          
          const comment = `## 🤖 Android Manifest Audit Results
          
          ${report}
          
          ---
          *Generated by [Android Manifest Auditor](https://github.com/gracestack/android-manifest-auditor)*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          
    - name: Check for errors
      if: steps.audit.outputs.found == 'true'
      run: |
        ERRORS=$(manifest-audit $MANIFESTS --json | jq '.summary.errors')
        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Found $ERRORS errors in manifest audit"
          exit 1
        else
          echo "✅ No errors found"
        fi
